<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carta para mi Mejor Amiga</title>
  <style>
    body {
      background: radial-gradient(circle at 70% 20%, #cf0452 0%, #6f1486 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pacifico', 'Comic Sans MS', cursive, sans-serif; /* Cambia aquí */
      margin: 0;
      overflow: hidden;
    }
    /* Polvo de tinta granate */
    .dust-bg {
      pointer-events: auto;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0;
      overflow: hidden;
    }
    .dust {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 60%, #a8003c 0%, #6a0030 80%, transparent 100%);
      opacity: 0.25;
      filter: blur(2px);
      pointer-events: auto;
      transition: opacity 0.5s, transform 0.7s;
      will-change: opacity, transform;
      z-index: 0;
    }
    .dust.fade {
      opacity: 0 !important;
      transform: scale(1.7) translateY(-30px) rotate(20deg);
      transition: opacity 0.7s, transform 0.7s;
    }
    /* SOBRE CUADRADO */
    .envelope-container {
      position: relative;
      width: 340px;
      height: 240px;
      perspective: 1200px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 8px 32px #e9456040);
      z-index: 2;
    }
    .envelope {
      width: 240px;
      height: 180px;
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      margin: auto;
      z-index: 2;
      transition: transform 1s cubic-bezier(.68,-0.55,.27,1.55);
      transform-style: preserve-3d;
      filter: drop-shadow(0 4px 24px #e94560a0);
      animation: envelopeFloat 3s ease-in-out infinite alternate;
      background: linear-gradient(135deg, #e94560 60%, #fff0f6 100%);
      border-radius: 18px;
      box-shadow: 0 8px 32px #e9456020, 0 0 0 4px #e94560 inset;
      border: 3px solid #fff;
      border-bottom: 6px solid #e94560;
    }
    @keyframes envelopeFloat {
      0% { transform: translateY(0);}
      100% { transform: translateY(-10px);}
    }
    .envelope.open {
      transform: rotateX(70deg) translateY(-60px) scale(1.05);
      z-index: 0;
      animation: none;
      opacity: 0.7;
      filter: blur(1px) drop-shadow(0 2px 12px #e94560a0);
    }
    .flap {
      position: absolute;
      top: -60px;
      left: 0;
      width: 240px;
      height: 80px;
      background: linear-gradient(135deg, #fff0f6 60%, #e94560 100%);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
      z-index: 3;
      transform-origin: bottom center;
      transition: transform 1s cubic-bezier(.68,-0.55,.27,1.55);
      box-shadow: 0 8px 24px #e9456040, 0 0 0 2px #fff inset;
      border-bottom: 4px solid #fff;
      border-left: 2px solid #e94560;
      border-right: 2px solid #e94560;
    }
    .envelope.open .flap {
      transform: rotateX(-120deg);
    }
    .heart {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.7rem;
      z-index: 4;
      filter: drop-shadow(0 2px 8px #e94560);
      animation: heartBeat 1.2s infinite alternate;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 12px #fff, 0 0 8px #e94560;
    }
    @keyframes heartBeat {
      from { transform: translateX(-50%) scale(1);}
      to { transform: translateX(-50%) scale(1.15);}
    }
    .letter {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translate(-50%, 0) scale(0.9);
      width: 340px;
      min-height: 160px;
      background: linear-gradient(120deg, #998f95 80%, #803434 100%); /* lila clarito */
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(233,69,96,0.18), 0 0 0 4px #e94560 inset;
      padding: 36px 32px 28px 32px;
      opacity: 0;
      z-index: 10;
      pointer-events: none;
      transition: 
        opacity 0.7s cubic-bezier(.68,-0.55,.27,1.55),
        transform 0.8s cubic-bezier(.68,-0.55,.27,1.55);
      font-family: 'Pacifico', 'Comic Sans MS', cursive, sans-serif; /* Fuente creativa */
      font-style: italic; /* Letras cursivas */
    }
    .letter.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -60px) scale(1.07) rotate(-2deg);
      animation: popIn 1.1s cubic-bezier(.68,-0.55,.27,1.55);
      box-shadow: 0 12px 40px #e9456030, 0 0 0 7px #e94560 inset;
    }
    @keyframes popIn {
      0% { transform: translate(-50%, 80px) scale(0.7) rotate(-8deg); opacity: 0; }
      80% { transform: translate(-50%, -70px) scale(1.13) rotate(2deg); opacity: 1; }
      100% { transform: translate(-50%, -60px) scale(1.07) rotate(-2deg);}
    }
    .letter h2 {
      color: #e94560;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.3rem;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #ffe0ec, 0 0 8px #e94560;
      animation: titlePop 1.2s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes titlePop {
      0% { letter-spacing: 0; opacity: 0;}
      60% { letter-spacing: 4px; opacity: 1;}
      100% { letter-spacing: 1px;}
    }
    .mensaje {
      color: #222;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 18px;
      text-align: justify;
      animation: fadeInText 1.5s 0.4s backwards;
    }
    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .firma {
      text-align: right;
      color: #0f3460;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 12px;
      animation: fadeInText 1.5s 0.7s backwards;
    }
    .decor {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 1.2rem;
      opacity: 0.7;
      pointer-events: none;
      user-select: none;
      animation: decorSpin 4s linear infinite;
    }
    .decor2 {
      /* Eliminado el giro y visibilidad */
      display: none !important;
    }
    @keyframes decorSpin {
      0% { transform: rotate(0);}
      100% { transform: rotate(360deg);}
    }
    /* Efecto de confeti */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      font-size: 1.5rem;
      opacity: 0.85;
      animation: confetti-fall 1.6s linear forwards;
      filter: drop-shadow(0 2px 8px #e94560);
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-40px) rotate(0deg);}
      100% { transform: translateY(100vh) rotate(360deg);}
    }
    /* Indicador de click */
    .click-indicator {
      position: absolute;
      top: 150px;
      left: 50%;
      transform: translateX(-50%);
      color: #e94560;
      font-size: 1.05rem;
      opacity: 0.8;
      animation: bounce 1.2s infinite;
      z-index: 20;
      pointer-events: none;
      user-select: none;
      letter-spacing: 1px;
      background: #fff0f6;
      border-radius: 8px;
      padding: 2px 12px;
      border: 1px solid #e94560;
      box-shadow: 0 2px 8px #e9456020;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0);}
      50% { transform: translateX(-50%) translateY(-10px);}
    }
    @media (max-width: 400px) {
      .envelope-container { width: 98vw; }
      .envelope, .flap, .letter { width: 95vw; max-width: 240px;}
      .letter { padding: 12px 4vw 12px 4vw;}
    }
    /* Imágenes en las esquinas */
    .corner-img {
      position: fixed;
      width: 48vw;   /* 48% del ancho de la pantalla */
      height: 48vh;  /* 48% del alto de la pantalla */
      z-index: 1;
      object-fit: contain;
      pointer-events: none;
    }
    .corner-img.big {
      position: fixed;
      width: 600vw;   /* Casi la mitad del ancho de la pantalla */
      height: 600vh;  /* Casi la mitad del alto de la pantalla */
      object-fit: contain;
      z-index: 1;
      pointer-events: none;
    }
    .top-left {
      top: 0;
      left: 0;
    }
    .top-right {
      top: 0;
      right: 0;
    }
    .bottom-left {
      bottom: 0;
      left: 0;
    }
    .bottom-right {
      bottom: 0;
      right: 0;
    }
  </style>
</head>
<body>
  <!-- Polvo de tinta granate -->
  <div class="dust-bg" id="dustBg"></div>
  <!-- QUITA las imágenes de portada de aquí -->
  <!-- <img src="..." class="corner-img top-left"> -->
  <!-- <img src="..." class="corner-img top-right"> -->
  <!-- <img src="..." class="corner-img bottom-left"> -->
  <!-- <img src="..." class="corner-img bottom-right"> -->
  <div class="envelope-container" id="envelopeContainer">
    <div class="envelope" id="envelope">
      <div class="flap"></div>
      <div class="heart">💌</div>
      <div class="click-indicator" id="clickIndicator">Pulsa el sobre💌</div>
    </div>
    <div class="letter" id="letter">
      <h2>Para mi Mejor Amiga 💖</h2>
      <div class="mensaje">
        (texto dedicado a ella)
      </div>
      <div class="firma">
        Con mucho amor<br>
        Bodri
      </div>
      <!-- <div class="decor">🌸🌷✨</div> -->
      <!-- <div class="decor2">🥰🌟</div> -->
    </div>
  </div>
  <audio id="cartaAudio" src="https://github.com/921RODRI/X-/raw/refs/heads/main/cardigan.mp3"></audio>
  <script>
  const dustBg = document.getElementById('dustBg');
  const dustCount = 70;
  function createDust(x, y) {
    const dust = document.createElement('div');
    dust.className = 'dust';
    dust.style.left = (x !== undefined ? x : (Math.random() * window.innerWidth)) + 'px';
    dust.style.top = (y !== undefined ? y : (Math.random() * window.innerHeight)) + 'px';
    // Tamaño pequeño, como un punto
    const size = 3 + Math.random() * 2; // entre 3px y 5px
    dust.style.width = size + 'px';
    dust.style.height = size + 'px';
    const pinks = [
      'radial-gradient(circle at 40% 60%, #ffb6d5 0%, #ff69b4 80%, transparent 100%)',
      'radial-gradient(circle at 60% 40%, #ffb6d5 0%, #e75480 80%, transparent 100%)',
      'radial-gradient(circle at 50% 50%, #f8a5c2 0%, #f78fb3 80%, transparent 100%)'
    ];
    dust.style.background = pinks[Math.floor(Math.random() * pinks.length)];
    dust.style.opacity = (0.25 + Math.random() * 0.25).toFixed(2);
    dust.style.transform = `scale(${0.9 + Math.random() * 0.3}) rotate(${Math.random()*360}deg)`;
    dustBg.appendChild(dust);
    return dust;
  }
  // Inicial
  for (let i = 0; i < dustCount; i++) {
    createDust();
  }

  // Desvanecer polvo al tocar/click
  dustBg.addEventListener('click', function(e) {
    if (e.target.classList.contains('dust')) {
      e.target.classList.add('fade');
      setTimeout(() => e.target.remove(), 800);
    }
  });

  // Tocar para desvanecer o crear polvo al deslizar
  let draggingDust = null;
  let offsetX = 0, offsetY = 0;

  dustBg.addEventListener('touchstart', function(e) {
    for (let touch of e.touches) {
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('dust')) {
        draggingDust = el;
        offsetX = touch.clientX - el.offsetLeft;
        offsetY = touch.clientY - el.offsetTop;
      } else {
        createDust(touch.clientX, touch.clientY);
      }
    }
  });

  dustBg.addEventListener('touchmove', function(e) {
    if (draggingDust && e.touches.length > 0) {
      const touch = e.touches[0];
      draggingDust.style.left = (touch.clientX - offsetX) + 'px';
      draggingDust.style.top = (touch.clientY - offsetY) + 'px';
    } else {
      for (let touch of e.touches) {
        createDust(touch.clientX, touch.clientY);
      }
    }
  });

  dustBg.addEventListener('touchend', function(e) {
    draggingDust = null;
  });

  // Mouse: mover y crear polvo
  let mouseDragging = null, mouseOffsetX = 0, mouseOffsetY = 0;
  dustBg.addEventListener('mousedown', function(e) {
    if (e.target.classList.contains('dust')) {
      mouseDragging = e.target;
      mouseOffsetX = e.clientX - e.target.offsetLeft;
      mouseOffsetY = e.clientY - e.target.offsetTop;
    } else {
      createDust(e.clientX, e.clientY);
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (mouseDragging) {
      mouseDragging.style.left = (e.clientX - mouseOffsetX) + 'px';
      mouseDragging.style.top = (e.clientY - mouseOffsetY) + 'px';
    }
  });
  document.addEventListener('mouseup', function() {
    mouseDragging = null;
  });

  // Sobre y carta
  const envelope = document.getElementById('envelope');
  const letter = document.getElementById('letter');
  const clickIndicator = document.getElementById('clickIndicator');
  let opened = false;

  function showScreenEmojis() {
    const emojis = ['🎉','✨','💖','🌸','🎊','🎈','💥','⭐','🫂','🎆','😍','🥰','🌷','🌺','💝','💜','💙','💛','🦋','🫶'];
    const total = 40;
    for (let i = 0; i < total; i++) {
      const emoji = document.createElement('span');
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.position = 'fixed';
      emoji.style.left = (Math.random() * 96) + 'vw';
      emoji.style.top = (Math.random() * 90) + 'vh';
      emoji.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
      emoji.style.opacity = '0';
      emoji.style.transition = 'opacity 0.5s, transform 2.2s';
      emoji.style.zIndex = 3000;
      document.body.appendChild(emoji);
      setTimeout(() => {
        emoji.style.opacity = '1';
        emoji.style.transform = `scale(${1 + Math.random()}) rotate(${Math.random()*360}deg)`;
      }, 50 + Math.random()*300);
      setTimeout(() => {
        emoji.style.opacity = '0';
        emoji.style.transform += ' translateY(-60px)';
      }, 1700 + Math.random()*500);
      setTimeout(() => emoji.remove(), 2600 + Math.random()*500);
    }
  }

  const cornerImages = [
    {src: "https://m.media-amazon.com/images/M/MV5BYWYwYzYzMjUtNWE0MS00NmJlLTljNGMtNzliYjg5NzQ1OWY5XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg", class: "corner-img top-left"},
    {src: "https://imageio.forbes.com/specials-images/imageserve/646e6affb9a2a85595a62c39/0x0.jpg?format=jpg&crop=1573,1574,x239,y256,safe&height=416&width=416&fit=bounds", class: "corner-img top-right"},
    {src: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSH-eAskVi9G7OL9BJrWsqFtr1xxVuJVW5bNw&s", class: "corner-img bottom-left"},
    {src: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdylQVtkOg56dkhJ2_ED1c6fQ-k1uTc8Gbww&s", class: "corner-img bottom-right"}
  ];

  envelope.addEventListener('click', function() {
    if (opened) return;
    envelope.classList.add('open');
    letter.classList.add('visible');
    if (clickIndicator) clickIndicator.style.display = 'none';
    showScreenEmojis(); // Mostrar emojis por toda la pantalla

    // Insertar imágenes de las esquinas
    cornerImages.forEach(imgData => {
      const img = document.createElement('img');
      img.src = imgData.src;
      img.className = imgData.class;
      document.body.appendChild(img);
    });

    // Reproducir canción solo al abrir la carta
    const audio = document.getElementById('cartaAudio');
    audio.currentTime = 0;
    audio.play().catch(err => {
      console.log('Error al reproducir:', err);
    });

    opened = true;
  });

  </script>
</body>
</html>
